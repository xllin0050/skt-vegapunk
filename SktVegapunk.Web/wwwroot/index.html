<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SktVegapunk</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --yellow:     #F0B90B;
      --yellow-dim: rgba(240,185,11,0.08);
      --green:      #0ECB81;
      --red:        #F6465D;
      --nav-bg:     #222126;
      --left-bg:    #2B2F36;
      --main-bg:    #1E2026;
      --card-bg:    #2B2F36;
      --border:     #363940;
      --text:       #E6E8EA;
      --muted:      #848E9C;
      --ink:        #1E2026;
      --terminal:   #0D0D0D;
      --radius:     8px;
      --transition: 200ms ease;
    }
    html, body { height: 100%; font-family: system-ui, -apple-system, sans-serif; background: var(--main-bg); color: var(--text); font-size: 14px; }

    /* ── Navbar ── */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; height: 56px; z-index: 100;
      background: var(--nav-bg); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 24px; gap: 12px;
    }
    .navbar-brand { font-size: 16px; font-weight: 700; color: var(--yellow); letter-spacing: 0.5px; }
    .navbar-sub { font-size: 12px; color: var(--muted); }

    /* ── Layout ── */
    .layout { display: flex; height: 100vh; padding-top: 56px; }

    /* ── Left Panel ── */
    .left-panel {
      width: 280px; flex-shrink: 0;
      background: var(--left-bg); border-right: 1px solid var(--border);
      overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 20px;
    }
    .field-group { display: flex; flex-direction: column; gap: 6px; }
    .field-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }

    /* Radio */
    .radio-group { display: flex; flex-direction: column; gap: 6px; }
    .radio-item { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 8px 10px; border-radius: var(--radius); border: 1px solid var(--border); transition: border-color var(--transition), background var(--transition); }
    .radio-item:hover { border-color: var(--yellow); }
    .radio-item.active { border-color: var(--yellow); background: var(--yellow-dim); }
    .radio-item input[type=radio] { accent-color: var(--yellow); width: 14px; height: 14px; }
    .radio-item .radio-label { font-size: 13px; color: var(--text); }
    .radio-item .radio-desc { font-size: 11px; color: var(--muted); margin-top: 1px; }

    /* Select */
    select {
      width: 100%; padding: 8px 10px; background: var(--main-bg); color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px;
      outline: none; cursor: pointer; transition: border-color var(--transition);
    }
    select:focus { border-color: var(--yellow); }

    /* Path input */
    .path-row { display: flex; gap: 6px; }
    .path-input {
      flex: 1; padding: 8px 10px; background: var(--main-bg); color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius); font-size: 12px;
      font-family: monospace; outline: none; transition: border-color var(--transition);
    }
    .path-input:focus { border-color: var(--yellow); }
    .path-input::placeholder { color: var(--muted); }
    .btn-browse {
      padding: 8px 10px; background: var(--card-bg); color: var(--muted);
      border: 1px solid var(--border); border-radius: var(--radius); font-size: 11px;
      cursor: pointer; white-space: nowrap; transition: all var(--transition);
    }
    .btn-browse:hover { border-color: var(--yellow); color: var(--yellow); }

    /* Migration-only fields */
    #migration-fields { display: none; flex-direction: column; gap: 20px; }
    #migration-fields.visible { display: flex; }

    /* Execute button */
    .btn-execute {
      width: 100%; padding: 12px; background: var(--yellow); color: var(--ink);
      border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background var(--transition), opacity var(--transition);
      margin-top: auto;
    }
    .btn-execute:hover { background: #D0980B; }
    .btn-execute:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Right Panel ── */
    .right-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* Idle */
    .idle-view {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px; color: var(--muted);
    }
    .idle-icon { font-size: 48px; opacity: 0.3; }
    .idle-title { font-size: 16px; font-weight: 500; color: var(--text); }
    .idle-sub { font-size: 13px; }

    /* Running */
    .running-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .run-header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--nav-bg);
    }
    .spinner {
      width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--yellow);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .run-status { font-size: 13px; color: var(--muted); }
    .terminal {
      flex: 1; overflow-y: auto; padding: 16px 20px;
      background: var(--terminal); font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 12.5px; line-height: 1.6; color: var(--green);
      white-space: pre-wrap; word-break: break-all;
    }
    .terminal .err-line { color: var(--red); }

    /* Done */
    .done-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .done-header {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 20px; border-bottom: 1px solid var(--border); background: var(--nav-bg);
    }
    .badge {
      padding: 3px 10px; border-radius: 50px; font-size: 11px; font-weight: 600;
    }
    .badge-success { background: rgba(14,203,129,0.15); color: var(--green); }
    .badge-error { background: rgba(246,70,93,0.15); color: var(--red); }
    .btn-log-toggle {
      margin-left: auto; padding: 4px 10px; background: transparent; color: var(--muted);
      border: 1px solid var(--border); border-radius: var(--radius); font-size: 11px;
      cursor: pointer; transition: all var(--transition);
    }
    .btn-log-toggle:hover { border-color: var(--muted); color: var(--text); }

    /* Terminal collapsible in done state */
    .log-collapse { overflow: hidden; transition: max-height 0.3s ease; }
    .log-collapse.collapsed { max-height: 0 !important; }

    /* Artifact viewer */
    .artifact-viewer { flex: 1; display: flex; overflow: hidden; }
    .file-tree {
      width: 240px; flex-shrink: 0; overflow-y: auto;
      border-right: 1px solid var(--border); padding: 12px 0;
      background: var(--left-bg);
    }
    .tree-dir {
      padding: 4px 16px; font-size: 11px; font-weight: 600;
      color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-top: 8px;
    }
    .tree-file {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 16px; cursor: pointer; font-size: 12.5px; color: var(--muted);
      border-left: 2px solid transparent; transition: all var(--transition);
    }
    .tree-file:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .tree-file.active { color: var(--yellow); border-left-color: var(--yellow); background: var(--yellow-dim); }
    .tree-file-icon { font-size: 11px; opacity: 0.6; }

    /* Markdown viewer */
    .md-viewer { flex: 1; overflow-y: auto; padding: 32px 40px; }
    .md-placeholder {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; gap: 8px; color: var(--muted);
    }
    .md-placeholder .ph-icon { font-size: 32px; opacity: 0.3; }

    /* Markdown content styles */
    .md-content h1 { font-size: 22px; font-weight: 700; color: var(--text); margin: 0 0 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .md-content h2 { font-size: 17px; font-weight: 600; color: var(--text); margin: 24px 0 12px; }
    .md-content h3 { font-size: 14px; font-weight: 600; color: var(--yellow); margin: 18px 0 8px; }
    .md-content p { line-height: 1.7; color: var(--text); margin-bottom: 12px; }
    .md-content ul, .md-content ol { margin: 8px 0 12px 20px; line-height: 1.7; color: var(--text); }
    .md-content li { margin-bottom: 4px; }
    .md-content code { font-family: monospace; font-size: 12px; background: var(--card-bg); padding: 2px 6px; border-radius: 4px; color: var(--green); }
    .md-content pre { background: var(--card-bg); border-radius: var(--radius); padding: 16px; overflow-x: auto; margin: 12px 0; }
    .md-content pre code { background: transparent; padding: 0; color: inherit; }
    .md-content table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13px; }
    .md-content th { background: var(--card-bg); color: var(--muted); text-align: left; padding: 8px 12px; border: 1px solid var(--border); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
    .md-content td { padding: 8px 12px; border: 1px solid var(--border); color: var(--text); }
    .md-content tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
    .md-content a { color: var(--yellow); text-decoration: none; }
    .md-content a:hover { text-decoration: underline; }
    .md-content blockquote { border-left: 3px solid var(--yellow); padding-left: 12px; color: var(--muted); margin: 12px 0; }
    .md-content hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
    .md-content strong { color: var(--text); font-weight: 600; }

    /* ── Directory Browser Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.7); align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--left-bg); border: 1px solid var(--border); border-radius: 12px;
      width: 560px; max-height: 70vh; display: flex; flex-direction: column; overflow: hidden;
    }
    .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .modal-title { font-size: 14px; font-weight: 600; color: var(--text); }
    .modal-path { font-size: 11px; color: var(--muted); font-family: monospace; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .modal-close { margin-left: auto; background: transparent; border: none; color: var(--muted); font-size: 18px; cursor: pointer; line-height: 1; padding: 0 4px; }
    .modal-close:hover { color: var(--text); }
    .modal-entries { flex: 1; overflow-y: auto; padding: 8px 0; }
    .modal-entry {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 20px; cursor: pointer; font-size: 13px; color: var(--text);
      transition: background var(--transition);
    }
    .modal-entry:hover { background: rgba(255,255,255,0.05); }
    .modal-entry .entry-icon { color: var(--yellow); font-size: 12px; width: 16px; }
    .modal-entry .entry-up { color: var(--muted); }
    .modal-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
    .btn-select {
      padding: 8px 20px; background: var(--yellow); color: var(--ink);
      border: none; border-radius: var(--radius); font-size: 13px; font-weight: 600; cursor: pointer;
      transition: background var(--transition);
    }
    .btn-select:hover { background: #D0980B; }
    .btn-cancel {
      padding: 8px 16px; background: transparent; color: var(--muted);
      border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; cursor: pointer;
      transition: all var(--transition);
    }
    .btn-cancel:hover { border-color: var(--muted); color: var(--text); }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <span class="navbar-brand">SktVegapunk</span>
  <span class="navbar-sub">Migration Studio</span>
</nav>

<!-- Layout -->
<div class="layout">

  <!-- ── Left Panel ── -->
  <aside class="left-panel">

    <!-- 輸出模式 -->
    <div class="field-group">
      <div class="field-label">輸出模式</div>
      <div class="radio-group">
        <label class="radio-item active" id="mode-spec-item">
          <input type="radio" name="mode" value="spec" checked />
          <div>
            <div class="radio-label">規格拆解</div>
            <div class="radio-desc">--spec-source</div>
          </div>
        </label>
        <label class="radio-item" id="mode-migration-item">
          <input type="radio" name="mode" value="migration" />
          <div>
            <div class="radio-label">程式碼遷移</div>
            <div class="radio-desc">--source</div>
          </div>
        </label>
      </div>
    </div>

    <!-- AI 模型 -->
    <div class="field-group">
      <div class="field-label">AI 模型</div>
      <select id="model-select">
        <option value="">載入中...</option>
      </select>
    </div>

    <!-- Source 路徑 -->
    <div class="field-group">
      <div class="field-label" id="source-label">Source 路徑</div>
      <div class="path-row">
        <input class="path-input" id="source-path" type="text" placeholder="/path/to/source" />
        <button class="btn-browse" onclick="openBrowser('source-path')">瀏覽</button>
      </div>
    </div>

    <!-- Output 路徑 -->
    <div class="field-group">
      <div class="field-label">Output 路徑</div>
      <div class="path-row">
        <input class="path-input" id="output-path" type="text" placeholder="/path/to/output" />
        <button class="btn-browse" onclick="openBrowser('output-path')">瀏覽</button>
      </div>
    </div>

    <!-- Migration-only fields -->
    <div id="migration-fields">
      <div class="field-group">
        <div class="field-label">Output 檔案 (.cs)</div>
        <div class="path-row">
          <input class="path-input" id="output-file-path" type="text" placeholder="/path/to/output.cs" />
          <button class="btn-browse" onclick="openBrowser('output-file-path')">瀏覽</button>
        </div>
      </div>
      <div class="field-group">
        <div class="field-label">Target Project</div>
        <div class="path-row">
          <input class="path-input" id="target-path" type="text" placeholder="/path/to/project.csproj" />
          <button class="btn-browse" onclick="openBrowser('target-path')">瀏覽</button>
        </div>
      </div>
    </div>

    <button class="btn-execute" id="btn-execute" onclick="execute()">執行</button>
  </aside>

  <!-- ── Right Panel ── -->
  <main class="right-panel" id="right-panel">

    <!-- Idle -->
    <div class="idle-view" id="idle-view">
      <div class="idle-icon">⚙️</div>
      <div class="idle-title">準備就緒</div>
      <div class="idle-sub">選擇路徑與模式後，按下執行</div>
    </div>

    <!-- Running -->
    <div class="running-view" id="running-view" style="display:none">
      <div class="run-header">
        <div class="spinner"></div>
        <div class="run-status">執行中...</div>
      </div>
      <div class="terminal" id="terminal-log"></div>
    </div>

    <!-- Done -->
    <div class="done-view" id="done-view" style="display:none">
      <div class="done-header">
        <span id="done-badge" class="badge"></span>
        <span id="done-message" style="font-size:13px;color:var(--muted);margin-left:4px"></span>
        <button class="btn-log-toggle" id="log-toggle" onclick="toggleLog()">顯示 Log</button>
      </div>
      <!-- 可折疊的 log -->
      <div class="log-collapse collapsed" id="log-collapse" style="max-height:200px">
        <div class="terminal" id="terminal-log-done" style="height:200px"></div>
      </div>
      <!-- Artifact viewer -->
      <div class="artifact-viewer">
        <div class="file-tree" id="file-tree">
          <div style="padding:20px;color:var(--muted);font-size:12px">載入 artifact...</div>
        </div>
        <div class="md-viewer" id="md-viewer">
          <div class="md-placeholder">
            <div class="ph-icon">📄</div>
            <div style="font-size:13px">點選左側檔案預覽</div>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>

<!-- ── Directory Browser Modal ── -->
<div class="modal-overlay" id="browser-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">選擇資料夾</span>
      <span class="modal-path" id="browser-path-display"></span>
      <button class="modal-close" onclick="closeBrowser()">✕</button>
    </div>
    <div class="modal-entries" id="browser-entries"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeBrowser()">取消</button>
      <button class="btn-select" id="btn-select-dir" onclick="selectCurrentDir()">選擇此資料夾</button>
    </div>
  </div>
</div>

<script type="module">
  // ── State ──────────────────────────────────────────────
  let currentMode = 'spec';
  let browserTargetId = null;
  let browserCurrentPath = '';
  let logCollapsed = true;
  let activeFileEl = null;

  // ── Init ───────────────────────────────────────────────
  async function init() {
    // 載入模型清單
    try {
      const res = await fetch('/api/config/models');
      const models = await res.json();
      const sel = document.getElementById('model-select');
      sel.innerHTML = models.map(m => `<option value="${m}">${m}</option>`).join('');
    } catch {
      document.getElementById('model-select').innerHTML = '<option value="">無法載入模型</option>';
    }

    // 模式切換
    document.querySelectorAll('input[name=mode]').forEach(radio => {
      radio.addEventListener('change', () => setMode(radio.value));
    });

    // radio item highlight
    document.querySelectorAll('.radio-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.radio-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
      });
    });
  }

  function setMode(mode) {
    currentMode = mode;
    const migFields = document.getElementById('migration-fields');
    const sourceLabel = document.getElementById('source-label');
    const outputLabel = document.querySelector('.field-group:nth-child(4) .field-label');
    if (mode === 'migration') {
      migFields.classList.add('visible');
      sourceLabel.textContent = 'Source 檔案 (.sru/.srw)';
    } else {
      migFields.classList.remove('visible');
      sourceLabel.textContent = 'Source 路徑';
    }
  }

  // ── Execute ────────────────────────────────────────────
  async function execute() {
    const sourcePath = document.getElementById('source-path').value.trim();
    const outputPath = document.getElementById('output-path').value.trim();
    const model = document.getElementById('model-select').value;

    if (!sourcePath || !outputPath) {
      alert('請填寫 Source 與 Output 路徑');
      return;
    }

    const req = { mode: currentMode, model, sourcePath, outputPath };

    if (currentMode === 'migration') {
      req.outputFilePath = document.getElementById('output-file-path').value.trim();
      req.targetPath = document.getElementById('target-path').value.trim();
      if (!req.outputFilePath || !req.targetPath) {
        alert('遷移模式需填寫 Output 檔案與 Target Project 路徑');
        return;
      }
    }

    setState('running');
    document.getElementById('btn-execute').disabled = true;
    document.getElementById('terminal-log').textContent = '';

    let res;
    try {
      res = await fetch('/api/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(req)
      });
    } catch (e) {
      appendLog(`[ERR] 無法連接伺服器：${e.message}`);
      return;
    }

    const { runId } = await res.json();

    const es = new EventSource(`/api/run/${runId}/stream`);

    es.onmessage = (e) => {
      appendLog(e.data);
    };

    es.addEventListener('done', (e) => {
      es.close();
      const exitCode = parseInt(e.data, 10);
      finishRun(exitCode, outputPath);
    });

    es.onerror = () => {
      es.close();
      appendLog('[ERR] 串流連線中斷');
      finishRun(-1, outputPath);
    };
  }

  function appendLog(line) {
    const el = document.getElementById('terminal-log');
    const isErr = line.startsWith('[ERR]');
    const span = document.createElement('span');
    if (isErr) span.className = 'err-line';
    span.textContent = line + '\n';
    el.appendChild(span);
    el.scrollTop = el.scrollHeight;
  }

  async function finishRun(exitCode, outputPath) {
    document.getElementById('btn-execute').disabled = false;

    // 把 log 複製到 done view 的 terminal
    const logDone = document.getElementById('terminal-log-done');
    logDone.innerHTML = document.getElementById('terminal-log').innerHTML;

    setState('done');

    const badge = document.getElementById('done-badge');
    const msg = document.getElementById('done-message');
    if (exitCode === 0) {
      badge.className = 'badge badge-success';
      badge.textContent = '成功';
      msg.textContent = '執行完成，請選擇 artifact 預覽';
    } else {
      badge.className = 'badge badge-error';
      badge.textContent = `失敗 (exit ${exitCode})`;
      msg.textContent = '請查看 Log 了解錯誤原因';
    }

    await loadArtifacts(outputPath);
  }

  // ── State machine ──────────────────────────────────────
  function setState(s) {
    document.getElementById('idle-view').style.display = s === 'idle' ? 'flex' : 'none';
    document.getElementById('running-view').style.display = s === 'running' ? 'flex' : 'none';
    document.getElementById('done-view').style.display = s === 'done' ? 'flex' : 'none';
  }

  // ── Log toggle ─────────────────────────────────────────
  function toggleLog() {
    logCollapsed = !logCollapsed;
    const el = document.getElementById('log-collapse');
    const btn = document.getElementById('log-toggle');
    el.classList.toggle('collapsed', logCollapsed);
    btn.textContent = logCollapsed ? '顯示 Log' : '隱藏 Log';
  }

  // ── Artifacts ──────────────────────────────────────────
  async function loadArtifacts(basePath) {
    const tree = document.getElementById('file-tree');
    tree.innerHTML = '<div style="padding:12px 16px;color:var(--muted);font-size:12px">載入中...</div>';

    try {
      const res = await fetch(`/api/artifacts?base=${encodeURIComponent(basePath)}`);
      const { files } = await res.json();

      if (!files || files.length === 0) {
        tree.innerHTML = '<div style="padding:12px 16px;color:var(--muted);font-size:12px">無 .md 檔案</div>';
        return;
      }

      renderFileTree(files);
    } catch (e) {
      tree.innerHTML = `<div style="padding:12px 16px;color:var(--red);font-size:12px">載入失敗：${e.message}</div>`;
    }
  }

  function renderFileTree(files) {
    const tree = document.getElementById('file-tree');
    tree.innerHTML = '';

    // 依目錄分組
    const groups = {};
    files.forEach(f => {
      const parts = f.relativePath.split('/');
      const dir = parts.length > 1 ? parts.slice(0, -1).join('/') : '(root)';
      if (!groups[dir]) groups[dir] = [];
      groups[dir].push(f);
    });

    Object.entries(groups).forEach(([dir, groupFiles]) => {
      if (dir !== '(root)') {
        const dirEl = document.createElement('div');
        dirEl.className = 'tree-dir';
        dirEl.textContent = dir;
        tree.appendChild(dirEl);
      }

      groupFiles.forEach(f => {
        const el = document.createElement('div');
        el.className = 'tree-file';
        el.innerHTML = `<span class="tree-file-icon">📄</span>${f.name}`;
        el.dataset.path = f.fullPath;
        el.addEventListener('click', () => openFile(f.fullPath, el));
        tree.appendChild(el);
      });
    });

    // 自動開啟 INDEX.md
    const indexFile = files.find(f => f.name === 'INDEX.md');
    if (indexFile) {
      const indexEl = tree.querySelector(`[data-path="${indexFile.fullPath}"]`);
      if (indexEl) openFile(indexFile.fullPath, indexEl);
    }
  }

  async function openFile(fullPath, el) {
    // 更新 active 狀態
    if (activeFileEl) activeFileEl.classList.remove('active');
    el.classList.add('active');
    activeFileEl = el;

    const viewer = document.getElementById('md-viewer');
    viewer.innerHTML = '<div style="padding:20px;color:var(--muted);font-size:13px">載入中...</div>';

    try {
      const res = await fetch(`/api/artifacts/content?path=${encodeURIComponent(fullPath)}`);
      const md = await res.text();

      marked.setOptions({
        highlight: (code, lang) => {
          if (lang && hljs.getLanguage(lang)) {
            return hljs.highlight(code, { language: lang }).value;
          }
          return hljs.highlightAuto(code).value;
        }
      });

      const html = marked.parse(md);
      viewer.innerHTML = `<div class="md-content">${html}</div>`;
    } catch (e) {
      viewer.innerHTML = `<div style="padding:20px;color:var(--red);font-size:13px">載入失敗：${e.message}</div>`;
    }
  }

  // ── Directory Browser ──────────────────────────────────
  function openBrowser(inputId) {
    browserTargetId = inputId;
    const currentVal = document.getElementById(inputId).value.trim();
    navigateTo(currentVal || null);
    document.getElementById('browser-modal').classList.add('open');
  }

  function closeBrowser() {
    document.getElementById('browser-modal').classList.remove('open');
    browserTargetId = null;
  }

  function selectCurrentDir() {
    if (browserTargetId && browserCurrentPath) {
      document.getElementById(browserTargetId).value = browserCurrentPath;
    }
    closeBrowser();
  }

  async function navigateTo(path) {
    const url = path
      ? `/api/dirs?path=${encodeURIComponent(path)}`
      : '/api/dirs';

    let data;
    try {
      const res = await fetch(url);
      data = await res.json();
    } catch {
      return;
    }

    browserCurrentPath = data.path;
    document.getElementById('browser-path-display').textContent = data.path;

    const entriesEl = document.getElementById('browser-entries');
    entriesEl.innerHTML = '';

    if (data.parent) {
      const up = document.createElement('div');
      up.className = 'modal-entry';
      up.innerHTML = `<span class="entry-icon entry-up">↑</span><span>..</span>`;
      up.addEventListener('click', () => navigateTo(data.parent));
      entriesEl.appendChild(up);
    }

    (data.entries || []).forEach(entry => {
      const el = document.createElement('div');
      el.className = 'modal-entry';
      el.innerHTML = `<span class="entry-icon">📁</span><span>${entry.name}</span>`;
      el.addEventListener('click', () => navigateTo(entry.fullPath));
      entriesEl.appendChild(el);
    });
  }

  // ── Expose to onclick handlers ─────────────────────────
  window.execute = execute;
  window.openBrowser = openBrowser;
  window.closeBrowser = closeBrowser;
  window.selectCurrentDir = selectCurrentDir;
  window.toggleLog = toggleLog;

  // ── Start ──────────────────────────────────────────────
  init();
</script>
</body>
</html>
